<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f8f9fa" id="theme-color-meta">
<meta name="description" content="本地私密日记本。AES-256 加密，数据仅存于设备，无需联网。">
<meta property="og:title" content="拾绪">
<meta property="og:description" content="零服务器，AES-256 加密，完全本地存储。免费。">
<meta property="og:image" content="shixu.png">
<title>拾绪</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="shixu.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="./lunar.js" onerror="loadFallbackLunar()"></script>
<script>
function loadFallbackLunar() {
    var script = document.createElement('script');
    script.src = "https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js";
    script.onload = function() {
        console.log("CDN lunar.js 加载成功");
        // 如果页面依赖 lunar 渲染日历，可以在这里重新触发渲染
        if (typeof renderCal === 'function') renderCal();
    };
    document.head.appendChild(script);
}
</script>
<style>
/* ============================================================
   1. 核心变量 (CSS Variables)
   ============================================================ */
:root {
    --primary: #2c3e50;
    --accent: #d4af37;
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #2c3e50;
    --danger: #e74c3c;
    --sub: #525c68;
    --mood-bg: #e9ecef;
    --nav-height: 48px;
    --energy: 212, 175, 55;
    --healing: 157, 176, 163;
    --thinking: 92, 122, 153;
    --release: 194, 107, 99;
    --melancholy: 138, 136, 148;
    --custom: 163, 160, 152;
}

/* 深色模式主题覆盖 */
[data-theme="dark"] {
    --primary: #ecf0f1;
    --accent: #f1c40f;
    --bg: #121212;
    --card: #1e1e1e;
    --text: #e0e0e0;
    --mood-bg: #2c2c2c;
}

/* 跟随系统深色模式 */
@media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
        --primary: #ecf0f1;
        --accent: #f1c40f;
        --bg: #121212;
        --card: #1e1e1e;
        --text: #e0e0e0;
        --mood-bg: #2c2c2c;
    }
}

/* ============================================================
   2. 全局重置 (Global Reset)
   ============================================================ */
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: #fff0;
    outline: none;
}

html,
body {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: -apple-system, system-ui, sans-serif;
    color: var(--text);
    overflow-x: hidden;
    transition: background 0.3s;
}

/* ============================================================
   3. 页面容器与结构 (Layout Containers)
   ============================================================ */
.page,
#d-page {
    transition: none;
}

/* 详情页基础样式 */
#d-page {
    display: none;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100dvh;
    min-height: -webkit-fill-available;
    background: var(--bg);
    z-index: 100;
    opacity: 0;
    padding-top: env(safe-area-inset-top);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
}

#d-page.active {
    opacity: 1;
    transform: translateX(0);
}

#h-page.fade-out {
    opacity: 0;
    pointer-events: none;
}

/* 顶部导航栏 */
.static-nav {
    position: relative;
    width: 100%;
    min-height: var(--nav-height);
    background: var(--bg);
    border-bottom: 1px solid rgb(0 0 0 / .05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
}

/* ============================================================
   4. 日历组件 (Calendar)
   ============================================================ */
.cal-section {
    margin: 8px 15px;
    border-radius: 20px;
    background: var(--card);
    padding-bottom: 8px;
    box-shadow: 0 5px 25px rgb(0 0 0 / .03);
}

.cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 8px;
    gap: 1px;
    transition: opacity 0.15s ease-out;
}

.cal-grid.fade {
    opacity: 0;
}

.day {
    height: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: background-color 0.15s ease, transform 0.1s cubic-bezier(.4, 0, .2, 1);
    -webkit-tap-highlight-color: #fff0;
    user-select: none;
    -webkit-user-select: none;
}

.day span:first-child {
    font-size: 17px;
    font-weight: 600;
}

/* 农历/节日文字 */
.day .l {
    font-size: 12px;
    margin-top: 0;
    white-space: nowrap;
    letter-spacing: -.2px;
    transform: scale(.82);
}

.day.recorded {
    background: var(--mood-bg);
}

.day.is-today {
    color: var(--accent) !important;
}

/* 有记录的小圆点指示 */
.day.recorded::after {
    content: '';
    position: absolute;
    bottom: 2px;
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
}

.day:active {
    transform: scale(.92);
    background-color: var(--mood-bg);
}

.day.is-today:active {
    transform: scale(.92);
    background-color: var(--mood-bg) !important;
    opacity: .8;
}

.day.recorded:active {
    background-color: rgb(0 0 0 / .08);
}

[data-theme="dark"] .day.recorded:active {
    background-color: rgb(255 255 255 / .08);
}

/* ============================================================
   5. 按钮系统 (Buttons)
   ============================================================ */
.btn-pill {
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    font-size: 13px;
    font-weight: 600;
    padding: 0 16px;
    border-radius: 16px;
    border: none;
    background: var(--mood-bg);
    color: var(--primary);
    cursor: pointer;
    transition: transform 0.1s ease, filter 0.1s ease;
    white-space: nowrap;
    flex-shrink: 0;
}

.btn-pill:active {
    transform: scale(.95);
    filter: brightness(.9);
}

.btn-save {
    background: var(--primary);
    color: var(--bg);
}

.icon-btn {
    background: none;
    border: none;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease, background-color 0.1s ease;
    border-radius: 50%;
}

.icon-btn svg {
    width: 18px;
    height: 18px;
    fill: var(--sub);
}

.icon-btn:active {
    transform: scale(.85);
    background-color: var(--mood-bg);
}

/* ============================================================
   6. 编辑器与正文 (Editor)
   ============================================================ */
.editor-box {
    width: 100%;
    min-height: 30vh;
    font-size: 18px;
    line-height: 1.8;
    letter-spacing: .5px;
    color: var(--text);
    white-space: pre-wrap;
    outline: none;
}

.editor-box:empty:before {
    content: attr(placeholder);
    color: var(--sub);
    opacity: .5;
}

.box-header {
    font-size: 12px;
    font-weight: 700;
    margin: 0 0 12px;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ============================================================
   7. 弹窗组件 (Modals)
   ============================================================ */
.modal {
    position: fixed;
    inset: 0;
    background: rgb(0 0 0 / .5);
    backdrop-filter: blur(8px);
    z-index: 300;
    display: none;
    align-items: flex-end;
    opacity: 0;
    transition: opacity 0.3s cubic-bezier(.4, 0, .2, 1);
}

.modal.show {
    opacity: 1;
}

.modal-content {
    background: var(--card);
    width: 100%;
    border-radius: 25px 25px 0 0;
    padding: 20px;
    max-height: 85vh;
    overflow-y: auto;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
}

.modal.show .modal-content {
    transform: translateY(0);
}

/* ============================================================
   8. 认证层 (Auth Layer)
   ============================================================ */
#auth-layer {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 400;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#pwd-i {
    padding: 15px;
    border: none;
    background: var(--mood-bg);
    color: var(--text);
    border-radius: 20px;
    margin-bottom: 20px;
    text-align: center;
    font-size: 24px;
    width: 220px;
}

/* ============================================================
   9. 设置与选项 (Settings)
   ============================================================ */
.setting-row {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--mood-bg);
    padding: 0 18px;
    margin-bottom: 12px;
    border-radius: 14px;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: #fff0;
}

.setting-row:active {
    transform: scale(.97);
    opacity: .8;
}

/* 设置中的大按钮适配 */
.modal-content .btn-pill {
    height: 54px !important;
    width: 100% !important;
    padding: 0 18px !important;
    margin-bottom: 12px !important;
    border-radius: 14px !important;
    font-size: 15px !important;
    box-sizing: border-box;
}

.theme-switch-group {
    height: 54px;
    display: flex;
    align-items: center;
    background: var(--mood-bg);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 12px;
}

.theme-switch-group .theme-btn {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--sub);
    cursor: pointer;
    transition: 0.2s;
}

.theme-btn.active {
    background: var(--card);
    color: var(--primary);
    box-shadow: 0 2px 8px rgb(0 0 0 / .05);
}

/* ============================================================
   10. 心情标签 (Mood Tags)
   ============================================================ */
#mood-grid-main {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

.mood-tag {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
    padding: 0 4px;
    margin: 0;
    border-radius: 14px;
    background: var(--mood-bg);
    color: var(--sub);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid #fff0;
    white-space: nowrap;
}

.mood-tag.active {
    background: var(--primary) !important;
    color: var(--bg) !important;
    font-weight: 600;
    box-shadow: 0 4px 12px rgb(0 0 0 / .1);
}

/* 心情颜色系列 */
.mood-tag.active.f-energy { background: rgb(var(--energy)) !important; color: #fff !important; }
.mood-tag.active.f-healing { background: rgb(var(--healing)) !important; color: #fff !important; }
.mood-tag.active.f-thinking { background: rgb(var(--thinking)) !important; color: #fff !important; }
.mood-tag.active.f-melancholy { background: rgb(var(--melancholy)) !important; color: #fff !important; }
.mood-tag.active.f-release { background: rgb(var(--release)) !important; color: #fff !important; }

/* 日历控制按钮微调 */
.cal-ctrl button {
    transition: transform 0.1s ease, background-color 0.1s;
    border-radius: 12px;
}

.cal-ctrl button:active {
    transform: scale(.85);
    background-color: rgb(0 0 0 / .08) !important;
}

/* ============================================================
   11. 消息通知 (Toast)
   ============================================================ */
#toast-container {
    position: fixed;
    top: env(safe-area-inset-top, 20px);
    left: 0;
    right: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
}

.toast {
    padding: 12px 24px;
    border-radius: 12px;
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgb(0 0 0 / .1);
    border-left: 4px solid var(--accent);
    animation: toast-in 0.3s cubic-bezier(.4, 0, .2, 1);
    transition: opacity 0.3s ease, transform 0.3s ease;
    max-width: 90%;
    text-align: center;
    word-break: break-word;
}

.toast.t-error { border-left-color: var(--danger); }
.toast.t-success { border-left-color: var(--accent); }

.toast.fade-out {
    opacity: 0;
    transform: translateY(-20px) scale(.95);
}

[data-theme="dark"] .toast {
    box-shadow: 0 10px 30px rgb(0 0 0 / .3);
    border: 1px solid rgb(255 255 255 / .1);
    border-left: 4px solid var(--accent);
}

[data-theme="dark"] .toast.t-error { border-left-color: var(--danger); }
[data-theme="dark"] .toast.t-success { border-left-color: var(--accent); }

@keyframes toast-in {
    0% { opacity: 0; transform: translateY(-20px) scale(.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}
#content-v {
    font-size: 18px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    letter-spacing: 0.5px;
    overflow-wrap: break-word;
    word-break: break-word;
    overflow: visible;
}
/* ============================================================
   12. 打印与导出 (Print Styles)
   ============================================================ */
@media print {
    /* 隐藏所有无关元素 */
    #h-page, .static-nav, #settings-modal, #more-modal, #toast-container, .modal,
    #ios-survival-banner, #auth-layer, .icon-btn, .btn-pill:not(.btn-save),
    .cal-section, #search-input, #index-list, .growth-grid, .box-header, #days-count,
    .cal-ctrl, .cal-header, .cal-grid, .day, .modal-content, .modal, #mood-trigger-btn,
    #save-hint, #e-tools, #v-tools .icon-btn, #v-tools .btn-pill:not(.btn-save) {
        display: none !important;
    }

    /* 重置所有元素，清除固定定位、浮动、溢出限制 */
    * {
        position: static !important;
        float: none !important;
        overflow: visible !important;
        max-height: none !important;
        height: auto !important;
        page-break-after: auto;
        page-break-before: auto;
        page-break-inside: auto;
        transform: none !important;
        transition: none !important;
        box-shadow: none !important;
    }

    /* 重置 html, body */
    html, body {
        height: auto !important;
        min-height: auto !important;
        max-height: none !important;
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow: visible !important;
    }

    /* 详情页容器 */
    #d-page {
        display: block !important;
        position: static !important;
        height: auto !important;
        min-height: auto !important;
        max-height: none !important;
        overflow: visible !important;
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
        opacity: 1 !important;
        transform: none !important;
    }

    /* 主内容容器：移除宽度限制，占满纸张 */
    .main-container {
        max-width: none !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 20px !important;
        background: white !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        height: auto !important;
        overflow: visible !important;
    }

    /* 确保内容块可拆分 */
    #v-box, #e-box {
        height: auto !important;
        overflow: visible !important;
        page-break-inside: auto;
    }

    /* 正文区域允许换行和分页 */
    #content-v {
        font-size: 12pt !important;  /* 保证可读性 */
        line-height: 1.5 !important;
        overflow: visible !important;
        page-break-inside: auto;
        word-break: break-word;
        white-space: normal;
    }

    /* 标题和元数据 */
    #title-v, #meta-v {
        page-break-after: avoid;
        break-after: avoid;
    }

    /* 确保任何固定宽度的元素适应纸张 */
    img, svg {
        max-width: 100% !important;
        height: auto !important;
    }
	
}
/* ============================================================
   13. 桌面适配 (Desktop Responsive)
   ============================================================ */
@media (min-width: 768px) {
    body {
        background: #eef2f5;
        display: flex;
        justify-content: center;
    }

    [data-theme="dark"] body { background: #0a0a0a; }

    .page,
    #d-page,
    #auth-layer {
        position: fixed !important;
        inset: 0 !important;
        margin: 20px auto !important;
        width: 100% !important;
        max-width: 480px !important;
        height: calc(100vh - 40px) !important;
        border-radius: 30px !important;
        box-shadow: 0 20px 60px rgb(0 0 0 / .1);
        border: 1px solid rgb(0 0 0 / .05);
        overflow-y: auto !important;
    }

    .modal {
        position: fixed !important;
        inset: 0 !important;
        margin: 20px auto !important;
        width: 100% !important;
        max-width: 480px !important;
        height: calc(100vh - 40px) !important;
        border-radius: 30px !important;
        overflow: hidden !important;
    }

    [data-theme="dark"] .page,
    [data-theme="dark"] #d-page,
    [data-theme="dark"] #auth-layer {
        border: 1px solid rgb(255 255 255 / .1);
        box-shadow: 0 20px 60px rgb(0 0 0 / .5);
    }

    #toast-container {
        max-width: 480px;
        margin: 0 auto;
        top: 40px;
    }
	html {
        background: #eef2f5 !important;
    }
    [data-theme="dark"] html {
        background: #0a0a0a !important;
    }
    body {
        background: transparent !important;
    }
    .page, #d-page, #auth-layer {
        background: var(--bg); /* 确保这些容器背景跟随主题 */
    }
}

/* ============================================================
   14. 细节与设备兼容修复 (Device Specific Fixes)
   ============================================================ */
#mood-trigger-btn {
    user-select: none;
    -webkit-tap-highlight-color: #fff0;
}

#mood-trigger-btn:active {
    transform: scale(.92);
    opacity: .8;
}

.main-container {
    max-width: 650px;
    margin: 0 auto;
    padding: 15px 20px;
    background: var(--bg);
    border-radius: 20px;
    height: auto;
    overflow: visible;
}
#v-box, #e-box {
    overflow: visible;
}
::selection { background-color: rgb(0 0 0 / .12); }
[data-theme="dark"] ::selection { background-color: rgb(255 255 255 / .18); }

/* 安卓设备拉动刷新限制 */
html.android-device, body.android-device {
    overscroll-behavior-y: none !important;
}

body.native-scroll #d-page {
    position: absolute !important;
    height: auto !important;
    min-height: 100vh !important;
    overflow: visible !important;
}

/* iOS 输入状态适配 */
html.ios-device.is-editing,
body.ios-device.is-editing {
    height: auto !important;
    min-height: 100vh !important;
    min-height: 100svh !important;
    overflow-y: auto !important;
    position: relative !important;
    background-color: var(--bg) !important;
}

body.ios-device.native-scroll.is-editing #d-page {
    position: relative !important;
    height: auto !important;
    min-height: 100vh !important;
    min-height: 100svh !important;
    overflow: visible !important;
    transform: none !important;
}

/* 编辑区高度分配 */
#v-box { padding-bottom: calc(45vh + env(safe-area-inset-bottom)) !important; }
#e-box { padding-bottom: 0 !important; }
#e-content { min-height: 50vh !important; padding-bottom: 30vh !important; }

/* 弹窗开启时的背景锁定 */
html.modal-open,
body.modal-open {
    overflow: hidden !important;
    touch-action: none !important;
}

/* 鼠标交互优化 */
@media (hover: hover) and (pointer: fine) {
    * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    html, body, html.is-editing, body.is-editing {
        overflow-y: scroll !important;
    }
    .btn-pill:active, .icon-btn:active, .day:active {
        transform: none !important;
        filter: brightness(.9);
    }
}

/* 自定义滚动条样式 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #fff0; }
::-webkit-scrollbar-thumb { background: rgb(0 0 0 / .1); border-radius: 10px; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgb(255 255 255 / .15); }

/* 触摸屏隐藏滚动条 */
@media (hover: none) and (pointer: coarse) {
    ::-webkit-scrollbar { width: 0; display: none; }
}

/* ============================================================
   15. 动画效果 (Animations)
   ============================================================ */
@keyframes slideFadeIn {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
}

.animate-in {
    animation: slideFadeIn 0.25s cubic-bezier(.2, .8, .2, 1) forwards;
}

.animate-out {
    animation: fadeOut 0.15s ease-out forwards;
}

/* ============================================================

        );
    },

    async encrypt(text) {
        if (!this.key || !text) return text;
        try {
            const iv = crypto.getRandomValues(new Uint8Array(12)); 
            const encodedText = new TextEncoder().encode(text);
            const cipherBuffer = await crypto.subtle.encrypt({name: "AES-GCM", iv}, this.key, encodedText);
            return this.buf2hex(iv) + ':' + this.buf2hex(cipherBuffer);
        } catch(e) { return text; }
    },

    async decrypt(cipherHex) {
        // 平滑兼容策略：如果没有冒号，说明是旧版明文数据，直接返回
        if (!this.key || !cipherHex || typeof cipherHex !== 'string' || !cipherHex.includes(':')) return cipherHex;
        try {
            const [ivHex, dataHex] = cipherHex.split(':');
            const iv = this.hex2buf(ivHex);
            const data = this.hex2buf(dataHex);
            const plainBuffer = await crypto.subtle.decrypt({name: "AES-GCM", iv}, this.key, data);
            return new TextDecoder().decode(plainBuffer);
        } catch (e) {
            return "【解密失败：数据可能损坏或密码变更】";
        }
    },

    buf2hex: (buffer) => Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join(''),
    hex2buf: (hex) => new Uint8Array(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)))
};
const dbSvc = {
    get: (key) => new Promise((resolve, reject) => {
        const req = db.transaction("notes", "readonly").objectStore("notes").get(key);
        req.onsuccess = async e => {
            const res = e.target.result;
            // 读取时拦截：静默解密
            if (res) {
                if (res.title) res.title = await CryptoSvc.decrypt(res.title);
                if (res.content) res.content = await CryptoSvc.decrypt(res.content);
            }
            resolve(res);
        }; 
        req.onerror = e => reject(e.target.error);
    }),
    put: async (data) => {
        // 写入时拦截：克隆一份数据，将明文替换为 AES 密文
        const encryptedData = { ...data };
        if (data.title) encryptedData.title = await CryptoSvc.encrypt(data.title);
        if (data.content) encryptedData.content = await CryptoSvc.encrypt(data.content);
        
        return new Promise((resolve, reject) => {
            const req = db.transaction("notes", "readwrite").objectStore("notes").put(encryptedData);
            req.onsuccess = () => resolve(); req.onerror = e => reject(e.target.error);
        });
    },
    delete: (key) => new Promise((resolve, reject) => {
        const req = db.transaction("notes", "readwrite").objectStore("notes").delete(key);
        req.onsuccess = () => resolve(); req.onerror = e => reject(e.target.error);
    }),
    clear: () => new Promise((resolve, reject) => {
        const req = db.transaction("notes", "readwrite").objectStore("notes").clear();
        req.onsuccess = () => resolve(); req.onerror = e => reject(e.target.error);
    }),
    getMetaForSync: () => new Promise((resolve, reject) => {
        const result = []; const req = db.transaction("notes", "readonly").objectStore("notes").openCursor();
        req.onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) { result.push({ date: cursor.value.date, mood: cursor.value.mood, words: cursor.value.words }); cursor.continue(); } 
            else resolve(result);
        };
        req.onerror = e => reject(e.target.error);
    }),
    getDataForSearch: () => new Promise((resolve, reject) => {
        const result = []; const req = db.transaction("notes", "readonly").objectStore("notes").openCursor();
        req.onsuccess = async e => {
            const cursor = e.target.result;
            if (cursor) { 
                // 搜索时必须解密内容才能被用户查找到
                const t = await CryptoSvc.decrypt(cursor.value.title || '');
                const c = await CryptoSvc.decrypt(cursor.value.content || '');
                result.push({ d: cursor.value.date, t: t, c: c }); 
                cursor.continue(); 
            } 
            else resolve(result);
        };
        req.onerror = e => reject(e.target.error);
    })
};

        // 1. 获取所有原始记录（密文）

            req.onsuccess = e => resolve(e.target.result);
            req.onerror = e => reject(e.target.error);
        });

        // 2. 并发解密（使用 Promise.allSettled 避免单条失败中断）
        const decryptPromises = allCipher.map(async (record) => {
            const plainRecord = { ...record };
            try {
                plainRecord.title = await CryptoSvc.decrypt(record.title);
                plainRecord.content = await CryptoSvc.decrypt(record.content);
            } catch (err) {
                // 解密失败时保留原值（可能是明文或损坏）
                console.warn(`解密失败 ${record.date}:`, err);

            // 移除 images 等无用字段

        });

        const allPlain = await Promise.all(decryptPromises);
        const dataStr = JSON.stringify(allPlain, null, 2);

function importJSON(input) {
    const file = input.files[0];
    if (!file) return;

    if (!confirm("恢复操作将覆盖现有冲突记录。是否继续？")) {
        input.value = '';
        return;
    }

    const r = new FileReader();
    r.onload = async e => {
        try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error("无效格式");

            // 第一步：预加密所有记录（不涉及数据库）
            const encryptedRecords = [];
            for (const record of data) {
                const encryptedRecord = { ...record };
                const isAlreadyEncrypted = (record.title && /^[a-f0-9]+:[a-f0-9]+$/i.test(record.title)) ||
                           (record.content && /^[a-f0-9]+:[a-f0-9]+$/i.test(record.content));
                if (!isAlreadyEncrypted) {
                    if (record.title) encryptedRecord.title = await CryptoSvc.encrypt(record.title);
                    if (record.content) encryptedRecord.content = await CryptoSvc.encrypt(record.content);
                }
                delete encryptedRecord.images;
                encryptedRecords.push(encryptedRecord);
            }

            // 第二步：开启事务，批量写入
            const tx = db.transaction("notes", "readwrite");
            const store = tx.objectStore("notes");
            const putPromises = encryptedRecords.map(record => {
                const request = store.put(record);
                return new Promise((resolve, reject) => {
                    request.onsuccess = resolve;
                    request.onerror = () => reject(request.error);
                });
            });

            await Promise.all(putPromises);
            await new Promise((resolve, reject) => {
                tx.oncomplete = resolve;
                tx.onerror = () => reject(tx.error);
            });

            sync();
            showToast("数据恢复成功！", "success");
            closeModal('settings-modal');
        } catch (err) {
            showToast("导入失败: " + err.message, "error");
        }
    };
    r.readAsText(file);
    input.value = '';
}

let randomHistory = [];
function goRandom() {
    const keys = Array.from(dataMap.keys());
    if (keys.length === 0) {
        showToast("还没有任何记录可以漫步哦", "info");
        return;
    }
    const today = new Date();
    const currY = today.getFullYear(), currM = today.getMonth() + 1, currD = today.getDate();
    const todayKey = `${currY}/${currM}/${currD}`;
    let availableKeys = keys.filter(k => k !== todayKey && k !== curKey);
    if (availableKeys.length === 0) {
        showToast("过去还是一片空白，快去创造回忆吧", "info");
        return;
    }

    const yearlyKeys = [];      // 往年今天
    const thisYearSameDay = []; // 今年其他月份的同一天
    const otherYearSameDay = [];// 往年其他月份的同一天

    availableKeys.forEach(k => {
        const [y, m, d] = k.split('/').map(Number);
        if (m === currM && d === currD && y !== currY) {
            yearlyKeys.push(k);
        } else if (d === currD && y === currY && m !== currM) {
            thisYearSameDay.push(k);
        } else if (d === currD && y !== currY) {
            otherYearSameDay.push(k);
        }
    });

    let targetKey = '';
    if (yearlyKeys.length > 0) {
        targetKey = yearlyKeys[Math.floor(Math.random() * yearlyKeys.length)];
        showToast(`时光机：回到了 ${targetKey.split('/')[0]} 年的今天`, "success");
    } else if (thisYearSameDay.length > 0) {
        targetKey = thisYearSameDay[Math.floor(Math.random() * thisYearSameDay.length)];
        const targetMonth = targetKey.split('/')[1];
        showToast(`时光机：回到了 ${targetMonth} 月的今天`, "success");
    } else if (otherYearSameDay.length > 0) {
        targetKey = otherYearSameDay[Math.floor(Math.random() * otherYearSameDay.length)];
        const targetDate = targetKey.split('/')[1] + '/' + targetKey.split('/')[2];
        showToast(`时光机：回到了 ${targetDate}（往年）`, "success");
    } else {
        let pool = availableKeys.filter(k => !randomHistory.includes(k));
        if (pool.length === 0) {
            randomHistory = [];
            pool = availableKeys;
        }
        targetKey = pool[Math.floor(Math.random() * pool.length)];
        randomHistory.push(targetKey);
        if (randomHistory.length > 10) randomHistory.shift();
        showToast("随机坠入某段回忆", "info");
    }
    openNote(targetKey);
}

async function hashStr(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

        const stored = localStorage.getItem(PWD_KEY);

        }

        $('pwd-i').value = '';

}

// [重构] 工业级安全文本渲染器 (免疫 XSS + 智能链接折叠)

function renderSafeText(text) {
    if (!text) return '';
    
    let safeText = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
        
    safeText = safeText.replace(/(https?:\/\/[a-zA-Z0-9\-._~:/?#[\]@!$&'()*+,;=%]+)/g, function(url) {
        const safeUrl = url.replace(/'/g, "\\'");
        return `<a href="${url}" target="_blank" style="
            display: inline;
            color: var(--accent);
            background: var(--mood-bg);
            padding: 0 2px;
            border-radius: 3px;
            text-decoration: none;
            font-size: 0.9em;
            line-height: 1.2;
            white-space: nowrap;
        " onclick="return confirm('即将访问外部链接：${safeUrl}\\n是否继续？');">
            <svg style="
                width: 0.9em;
                height: 0.9em;
                vertical-align: middle;
                display: inline;
                margin-right: 2px;
                stroke: currentColor;
                fill: none;
                stroke-width: 2;
            " viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            网页链接
        </a>`;
    });
    
    return safeText;
}

function renderGrowth(all, year) {
    const grid = $('growth-grid');
    grid.innerHTML = '';
    
    // 筛选当年记录并按日期排序
    const yearRecords = all.filter(n => parseInt(n.date.split('/')[0]) === parseInt(year))
                           .sort((a, b) => new Date(a.date.replace(/\//g, '-')) - new Date(b.date.replace(/\//g, '-')));
    
    if (yearRecords.length === 0) {
        grid.innerHTML = '<div style="color: var(--sub); font-size: 12px; padding: 8px;">暂无记录</div>';
        return;
    }

    // 计算最大字数（用于线性高度映射）
    const maxWords = Math.max(...yearRecords.map(n => n.words || 0), 1);
    const minHeight = 8, maxHeight = 60;  // 根据喜好调整范围
    
    yearRecords.forEach(record => {
        const cell = document.createElement('div');
        const family = record.mood && record.mood.split(',').length ? (moodFamilies[record.mood.split(',')[0]] || 'f-custom') : 'f-custom';
        const wordCount = record.words || 0;
        // 线性高度
        const height = minHeight + (wordCount / maxWords) * (maxHeight - minHeight);
        // 颜色透明度也随字数线性变化，增强波形感
        const opacity = 0.3 + (wordCount / maxWords) * 0.7;
        
        cell.className = `growth-cell ${family}`;
        cell.style.height = `${height}px`;
        cell.style.backgroundColor = `rgba(${colorMap[family] || colorMap['f-custom']}, ${opacity})`;
        // 不再设置 title
        grid.appendChild(cell);
    });
}

// ==========================================
// [重构] 工业级密码更新与全局数据重加密引擎
// ==========================================
async function updatePassword() { 
    const oldV = $('old-pwd').value, newV = $('new-pwd').value; 
    const stored = localStorage.getItem(PWD_KEY);
    const oldHashed = await hashStr(oldV);
    
    // 1. 验证旧身份
    if(oldHashed !== stored) { 
        showToast("旧密码验证失败", "error"); 
        return; 
    }
    if (!newV || newV.length < 4) {
        showToast("新密码不能少于 4 位", "error"); 
        return; 
    }

    // 冻结 UI 提示（时间设置为 99999，直到执行完毕后手动清除）
    showToast("正在重新加密本地数据，请勿关闭或刷新页面...", "info", 99999);

    try {
        // 2. 派生未来身份（新密钥），此时 CryptoSvc.key 依然是旧密钥
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            "raw", enc.encode(newV), {name: "PBKDF2"}, false, ["deriveKey"]
        );
        const newKey = await crypto.subtle.deriveKey(
            {name: "PBKDF2", salt: CryptoSvc.salt, iterations: 100000, hash: "SHA-256"},
            keyMaterial, {name: "AES-GCM", length: 256}, false, ["encrypt", "decrypt"]
        );

        // 辅助引擎：使用指定的新密钥进行独立加密
        const encryptWithNewKey = async (text) => {
            if (!text) return text;
            const iv = crypto.getRandomValues(new Uint8Array(12)); 
            const encodedText = new TextEncoder().encode(text);
            const cipherBuffer = await crypto.subtle.encrypt({name: "AES-GCM", iv}, newKey, encodedText);
            return CryptoSvc.buf2hex(iv) + ':' + CryptoSvc.buf2hex(cipherBuffer);
        };

        // 3. 瞬间拉取所有数据的索引键 (规避 OOM)
        const keys = await new Promise((resolve, reject) => {
            const req = db.transaction("notes", "readonly").objectStore("notes").getAllKeys();
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = e => reject(e.target.error);
        });

        // 4. 游击重加密战术 (避开 IDB 异步事务强制中断陷阱)
        for (let k of keys) {
			const plainData = await dbSvc.get(k);
			if (plainData) {
				const reEncryptedData = { ...plainData };
				if (plainData.title) reEncryptedData.title = await encryptWithNewKey(plainData.title);
				if (plainData.content) reEncryptedData.content = await encryptWithNewKey(plainData.content);
				try {
					await new Promise((resolve, reject) => {
						const req = db.transaction("notes", "readwrite").objectStore("notes").put(reEncryptedData);
						req.onsuccess = () => resolve();
						req.onerror = e => reject(e.target.error);
					});
				} catch (writeErr) {
					throw new Error(`重加密记录 ${k} 失败: ${writeErr.message}`);
				}
			}
		}

        // 5. 跨越奇点：旧时代结束，新时代开启
        const newHashed = await hashStr(newV);
        localStorage.setItem(PWD_KEY, newHashed); 
        CryptoSvc.key = newKey; // 核心引擎换上新密钥
        
        // 扫尾与 UI 恢复
        document.querySelectorAll('.toast').forEach(t => t.remove());
        showToast("密码修改成功，底层数据已全部重新加密！", "success"); 
        closeModal('pwd-modal');
        $('old-pwd').value = ''; $('new-pwd').value = '';

    } catch (err) {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        showToast("数据重加密异常: " + err.message, "error"); 
    }
}

function updateNetworkStatus() {
    const isOnline = navigator.onLine; const titleEl = $('d-date-title');
    const offlineSvg = `<svg style="width:16px; height:16px; vertical-align:-3px; margin-right:6px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
    if (!isOnline) {
        showToast("已进入离线模式", "info");
        if (titleEl && !titleEl.innerHTML.includes('<svg')) { titleEl.dataset.originalText = titleEl.innerText; titleEl.innerHTML = `${offlineSvg}<span style="opacity:0.7">离线</span> · ${titleEl.innerText}`; }
    } else { if (titleEl && titleEl.dataset.originalText) { titleEl.innerText = titleEl.dataset.originalText; delete titleEl.dataset.originalText; } }
}

window.addEventListener('offline', updateNetworkStatus);
window.addEventListener('online', () => { showToast("网络已恢复", "success"); updateNetworkStatus(); });
window.addEventListener('DOMContentLoaded', updateNetworkStatus);

async function generateCard() {
    if (!curKey) return; const d = await dbSvc.get(curKey); if (!d) return;
    openModal('card-modal'); const canvas = $('card-canvas'), ctx = canvas.getContext('2d');
    const W = 1080, margin = 120, fontSize = 44, lineHeight = 84;
    const authorName = localStorage.getItem('ShiXu_Author') || '未署名';
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const bgHex = isDark ? '#121212' : '#F5F4F0', textHex = isDark ? '#E8E8E8' : '#222222', subHex = isDark ? '#777777' : '#888888';
    const accentHex = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#d4af37';
    const serifFont = '"Noto Serif SC", "Songti SC", STZhongsong, serif', sansFont = 'system-ui, -apple-system, sans-serif';

    let rawText = d.content ? d.content.replace(/[*_~`#]/g, '') : (d.title || "记录当下"); rawText = rawText.trim();
    if (rawText.length > 800) rawText = rawText.substring(0, 800) + '...';

    ctx.font = `400 ${fontSize}px ${serifFont}`; const paragraphs = rawText.split('\n'); let lines = [];
    paragraphs.forEach(p => {
        let line = '';
        for (let i = 0; i < p.length; i++) {
            let testLine = line + p[i];
            if (ctx.measureText(testLine).width > W - margin * 2 && i > 0) { lines.push(line); line = p[i]; } else { line = testLine; }
        }
        lines.push(line); lines.push('【PARAGRAPH_BREAK】');
    });
    if (lines[lines.length - 1] === '【PARAGRAPH_BREAK】') lines.pop();
    const textTotalHeight = lines.reduce((acc, line) => acc + (line === '【PARAGRAPH_BREAK】' ? lineHeight * 0.5 : lineHeight), 0);
    const textStartY = margin + 140, footerHeight = 240, H = Math.max(1440, textStartY + textTotalHeight + footerHeight);

    canvas.width = W; canvas.height = H; ctx.fillStyle = bgHex; ctx.fillRect(0, 0, W, H);
    const grainCanvas = document.createElement('canvas'); grainCanvas.width = 100; grainCanvas.height = 100; const gCtx = grainCanvas.getContext('2d');
    for (let i = 0; i < 100; i += 2) { for (let j = 0; j < 100; j += 2) { if (Math.random() > 0.9) { gCtx.fillStyle = isDark ? 'rgba(255,255,255,0.01)' : 'rgba(0,0,0,0.01)'; gCtx.fillRect(i, j, 2, 2); } } }
    ctx.fillStyle = ctx.createPattern(grainCanvas, 'repeat'); ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = accentHex; ctx.fillRect(margin, margin, 80, 8);
    ctx.fillStyle = accentHex; ctx.globalAlpha = isDark ? 0.15 : 0.08; ctx.font = `italic 240px ${serifFont}`; ctx.fillText('“', margin - 40, textStartY + 90); ctx.globalAlpha = 1.0;

    ctx.fillStyle = textHex; ctx.font = `400 ${fontSize}px ${serifFont}`; ctx.textBaseline = 'top';
    let currentY = textStartY;
    lines.forEach(line => { if (line === '【PARAGRAPH_BREAK】') { currentY += lineHeight * 0.5; } else { ctx.fillText(line, margin, currentY); currentY += lineHeight; } });

    const footerY = H - footerHeight + 100;
    ctx.fillStyle = subHex; ctx.globalAlpha = 0.15; ctx.fillRect(margin, footerY - 50, W - margin * 2, 2); ctx.globalAlpha = 1.0;
    ctx.fillStyle = textHex; ctx.font = `600 36px ${sansFont}`; ctx.fillText(authorName, margin, footerY);
    ctx.fillStyle = subHex; ctx.font = `300 24px ${sansFont}`; ctx.fillText('拾绪', margin, footerY + 50); 
    ctx.textAlign = 'right'; const displayMood = d.mood ? d.mood.split(',')[0] : '○ 留白';
    ctx.fillStyle = textHex; ctx.font = `500 28px ${serifFont}`; ctx.fillText(displayMood, W - margin, footerY);
    ctx.fillStyle = subHex; ctx.font = `300 24px ${sansFont}`; ctx.fillText(d.date.replace(/\//g, ' . '), W - margin, footerY + 50);
    ctx.textAlign = 'left'; 
}
function downloadCard() {
    const canvas = $('card-canvas'); canvas.toBlob(blob => { saveAsSimple(blob, `ShiXu_Card_${Date.now()}.png`); showToast("长图已生成并保存", "success"); closeModal('card-modal'); }, 'image/png');
}
</script>
</body>
</html>
